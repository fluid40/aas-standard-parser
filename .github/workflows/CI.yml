name: CI

on:
  push:
    branches:
      - "**"

permissions:
  contents: write
  pull-requests: read

jobs:
  detect-project-changes:
    name: Check for new version
    runs-on: ubuntu-latest
    outputs:
      changed: ${{ steps.check.outputs.changed }}
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Check if pyproject.toml changed
        id: check
        run: |
          if git rev-parse HEAD^ >/dev/null 2>&1; then
            CHANGED_FILES="$(git diff --name-only HEAD^ HEAD)"
          else
            echo "No parent commit found, using full file list"
            CHANGED_FILES="$(git ls-files)"
          fi

          echo "Changed files:"
          echo "$CHANGED_FILES"

          if echo "$CHANGED_FILES" | grep -q '^pyproject\.toml$'; then
            echo "pyproject.toml changed, marking as changed"
            echo "changed=true" >> "$GITHUB_OUTPUT"
          else
            echo "pyproject.toml not changed, skipping release"
            echo "changed=false" >> "$GITHUB_OUTPUT"
          fi

  Run_Tests:
    name: Run Tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: pytest -v tests/*.py

  publish-pypi-package:
    name: Publish PyPI Package
    if: github.ref == 'refs/heads/main' && needs.detect-project-changes.outputs.changed == 'true'
    runs-on: ubuntu-latest
    needs: [detect-project-changes, Run_Tests]

    steps:
      - uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.11"

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: python -m build

      - name: Upload package as artifact
        uses: actions/upload-artifact@v4
        with:
          name: pypi-dist
          path: dist/*

      - name: Publish to PyPI
        env:
          TWINE_USERNAME: __token__
          TWINE_PASSWORD: ${{ secrets.PYPI_API_TOKEN }}
        run: twine upload dist/*

  github-release:
    name: Create GitHub Release
    runs-on: ubuntu-latest
    needs: publish-pypi-package

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Download package artifact
        uses: actions/download-artifact@v4
        with:
          name: pypi-dist
          path: dist

      - name: Extract version from pyproject.toml
        id: get_version
        run: |
          VERSION=$(python -c "import tomllib; print(tomllib.load(open('pyproject.toml','rb'))['project']['version'])")
          echo "version=$VERSION" >> $GITHUB_OUTPUT

          GIT_HASH=$(git rev-parse --short HEAD)
          echo "hash=$GIT_HASH" >> $GITHUB_OUTPUT

      - name: Get commit hash
        id: get_hash
        run: echo "hash=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

      - name: Generate Changelog
        id: changelog
        uses: mikepenz/release-changelog-builder-action@v4
        with:
          configuration: .github/changelog-config.json
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Create Git Tag
        run: |
          VERSION_TAG="v${{ steps.get_version.outputs.version }}"
          if git rev-parse "$VERSION_TAG" >/dev/null 2>&1; then
            echo "Tag $VERSION_TAG already exists."
          else
            git tag "$VERSION_TAG"
            git push origin "$VERSION_TAG"
          fi

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v3
        with:
          tag_name: v${{ steps.get_version.outputs.version }}
          name: 🚀 Release v${{ steps.get_version.outputs.version }}
          generate_release_notes: true
          body: |
            ## 📝 Release Notes

            **Version:** v${{ steps.get_version.outputs.version }}
            **Commit:** `${{ steps.get_version.outputs.hash }}`

            ### 🧩 Build Information
            - PyPI package: [`aas-standard-parser ${{ steps.get_version.outputs.version }}`](https://pypi.org/project/aas-standard-parser/${{ steps.get_version.outputs.version }})
            - `pip install aas-standard-parser`
            - [Changelog](docs/CHANGELOG.md)
            - [Documentation](https://fluid40.github.io/aas-standard-parser/)
          files: dist/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
